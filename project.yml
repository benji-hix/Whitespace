name: Whitespace

options:
  bundleIdPrefix: com.benji
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

targets:
  Whitespace:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Whitespace
    info:
      path: Sources/Whitespace/App/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: Whitespace
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: com.benji.Whitespace
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ALWAYS_SEARCH_USER_PATHS: NO
      configs:
        Debug:
          ENABLE_TESTABILITY: YES

  WhitespaceTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/WhitespaceTests
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: com.benji.WhitespaceTests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Whitespace

schemes:
  Whitespace:
    build:
      targets:
        Whitespace: all
        WhitespaceTests: [test]
    test:
      targets:
        - WhitespaceTests
