name: Folio

options:
  bundleIdPrefix: com.benji
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

targets:
  Folio:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Folio
    info:
      path: Sources/Folio/App/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: Folio
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: com.benji.Folio
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ALWAYS_SEARCH_USER_PATHS: NO
      configs:
        Debug:
          ENABLE_TESTABILITY: YES

  FolioTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/FolioTests
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: com.benji.FolioTests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Folio

schemes:
  Folio:
    build:
      targets:
        Folio: all
        FolioTests: [test]
    test:
      targets:
        - FolioTests
